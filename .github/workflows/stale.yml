name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity.
          stale-pr-message: >
            This pull request has been inactive for 60 days and will be closed in 14 days
            unless there is new activity.
          close-issue-message: Closed due to inactivity.
          close-pr-message: Closed due to inactivity.
